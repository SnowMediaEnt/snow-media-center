
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Android TV / STB tuning -->
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-navbutton-color" content="#000000">
    
    <title>Snow Media Center</title>
    
    <!-- Google Fonts -->
    <!-- Preconnect to icon/APK host so image requests don't pay TLS per request -->
    <link rel="preconnect" href="https://snowmediaapps.com" crossorigin>
    <link rel="dns-prefetch" href="https://snowmediaapps.com">

    <!-- Google Fonts — trimmed to only families/weights actually used (Montserrat + Nunito) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Nunito:wght@400;500;700&display=swap" rel="stylesheet">

    
    <script>
      // globalThis polyfill — MUST run before any other script/chunk.
      // Chrome 66 / Android 9 WebView (T95 etc.) has no globalThis and the
      // Supabase chunk references it, causing a white screen pre-React.
      (function(){
        if (typeof globalThis === 'object') return;
        try {
          Object.defineProperty(Object.prototype, '__magic__', { get: function(){ return this; }, configurable: true });
          __magic__.globalThis = __magic__;
          delete Object.prototype.__magic__;
        } catch (e) {
          if (typeof window !== 'undefined') window.globalThis = window;
        }
      })();
    </script>
    <script>
      // Polyfill structuredClone for older Android WebViews (FireTV, older STBs)
      if (typeof structuredClone === 'undefined') {
        window.structuredClone = function(obj) {
          return JSON.parse(JSON.stringify(obj));
        };
      }
    </script>
    <script>
      // Legacy WebView detection — add `legacy-webview` only on Chrome <79-class
      // WebViews that lack CSS clamp() support. Modern devices never get this class.
      try {
        if (!(window.CSS && window.CSS.supports && window.CSS.supports('width','clamp(1rem,2vw,3rem)'))) {
          document.documentElement.className += ' legacy-webview';
        }
      } catch (e) {}
    </script>

    <script>
      // BOOT HEARTBEAT diagnostic — silent on success; visible only on error or when debug flag is set.
      (function() {
        var stages = [];
        var hasError = false;
        var diag = null;

        function isDebug() {
          try {
            if (typeof localStorage !== 'undefined' && localStorage.getItem('smc_debug') === '1') return true;
          } catch (_) {}
          try {
            if (typeof location !== 'undefined' && /[?&]debug(=|&|$)/.test(location.search || '')) return true;
          } catch (_) {}
          return false;
        }

        var debugMode = isDebug();

        function ensureDiag() {
          if (diag) return diag;
          diag = document.createElement('div');
          diag.id = 'smc-diag';
          var color = hasError ? '#ff4444' : '#7CFC00';
          var style = 'position:fixed;top:0;left:0;max-width:96vw;z-index:2147483647;background:rgba(0,0,0,0.85);color:' + color + ';font-family:monospace;font-size:13px;padding:6px 8px;white-space:pre-wrap;word-break:break-word;pointer-events:none;';
          diag.setAttribute('style', style);
          if (document.body) {
            document.body.appendChild(diag);
          } else {
            document.addEventListener('DOMContentLoaded', function() {
              if (diag && !diag.parentNode && document.body) document.body.appendChild(diag);
            });
          }
          return diag;
        }

        function render() {
          if (!debugMode) return; // never render overlay for end users
          var el = ensureDiag();
          if (hasError) el.style.color = '#ff4444';
          el.textContent = stages.join('\n') + '\n';
        }


        window.__SMC_BOOT__ = function(stage) {
          stages.push('stage: ' + stage);
          render();
        };

        stages.push('SMC boot: html');
        stages.push('UA: ' + (navigator.userAgent || 'unknown'));
        render();

        function isChunkLoadError(msg, file) {
          if (!msg) return false;
          var m = String(msg);
          if (/Importing a module script failed/i.test(m)) return true;
          if (/Failed to fetch dynamically imported module/i.test(m)) return true;
          if (/error loading dynamically imported module/i.test(m)) return true;
          if (/ChunkLoadError/i.test(m)) return true;
          if (/Unable to preload CSS/i.test(m)) return true;
          if (file && /\/assets\/.*\.(js|mjs|css)$/i.test(String(file)) && /Load failed|NetworkError|Failed to fetch/i.test(m)) return true;
          return false;
        }

        function maybeReloadForStaleChunk(msg, file) {
          try {
            if (!isChunkLoadError(msg, file)) return;
            var KEY = 'smc_chunk_reload_at';
            var now = Date.now();
            var last = 0;
            try { last = parseInt(sessionStorage.getItem(KEY) || '0', 10) || 0; } catch (_) {}
            // Only auto-reload once per minute to avoid loops
            if (now - last < 60000) return;
            try { sessionStorage.setItem(KEY, String(now)); } catch (_) {}
            // Cache-bust to force fresh index.html + asset manifest
            var url = location.pathname + '?_r=' + now + (location.hash || '');
            location.replace(url);
          } catch (_) {}
        }

        function errorHandler(event) {
          hasError = true;
          var msg = '';
          if (event && event.reason) {
            var reason = event.reason;
            msg = (reason && reason.message) ? reason.message : String(reason);
          } else if (event && event.error) {
            var e = event.error;
            msg = (e && e.message) ? e.message : String(e);
          } else if (event && event.message) {
            msg = event.message;
          } else {
            msg = 'Unknown error';
          }
          var file = (event && event.filename) ? event.filename : '';
          var line = (event && event.lineno) ? event.lineno : '';
          var col = (event && event.colno) ? event.colno : '';
          var loc = file + (line ? ':' + line : '') + (col ? ':' + col : '');
          stages.push('ERR: ' + msg + (loc ? ' @ ' + loc : ''));
          render();
          maybeReloadForStaleChunk(msg, file);
        }

        window.addEventListener('error', errorHandler);
        window.addEventListener('unhandledrejection', errorHandler);
      })();
    </script>

    <style>
      /* Prevent Android TV scaling issues */
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      
      /* Force specific dimensions for Android TV */
      @media screen and (min-width: 1920px) {
        html {
          font-size: 16px;
        }
        
        body {
          zoom: 1;
          transform: scale(1);
          transform-origin: 0 0;
        }
      }
      
      /* Firestick specific fixes */
      @media (max-height: 1080px) and (min-width: 1920px) {
        #root {
          height: 100vh;
          max-height: 100vh;
          overflow-y: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
