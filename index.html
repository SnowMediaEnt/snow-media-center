
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Android TV / STB tuning -->
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-navbutton-color" content="#000000">
    
    <title>Snow Media Center</title>
    
    <!-- Google Fonts -->
    <!-- Preconnect to icon/APK host so image requests don't pay TLS per request -->
    <link rel="preconnect" href="https://snowmediaapps.com" crossorigin>
    <link rel="dns-prefetch" href="https://snowmediaapps.com">

    <!-- Google Fonts — trimmed to only families/weights actually used (Montserrat + Nunito) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Nunito:wght@400;500;700&display=swap" rel="stylesheet">

    
    <script>
      // Polyfill structuredClone for older Android WebViews (FireTV, older STBs)
      if (typeof structuredClone === 'undefined') {
        window.structuredClone = function(obj) {
          return JSON.parse(JSON.stringify(obj));
        };
      }
    </script>
    <script>
      // BOOT HEARTBEAT diagnostic — ES5-safe, dependency-free
      (function() {
        var stages = [];
        var hasError = false;
        var diag = null;
        var hideTimer = null;

        function getDiag() {
          if (!diag) {
            diag = document.createElement('div');
            diag.id = 'smc-diag';
            var style = 'position:fixed;top:0;left:0;max-width:96vw;z-index:2147483647;background:rgba(0,0,0,0.85);color:#7CFC00;font-family:monospace;font-size:13px;padding:6px 8px;white-space:pre-wrap;word-break:break-word;pointer-events:none;';
            diag.setAttribute('style', style);
            if (document.body) {
              document.body.appendChild(diag);
            } else {
              document.addEventListener('DOMContentLoaded', function() {
                if (diag && !diag.parentNode && document.body) {
                  document.body.appendChild(diag);
                }
              });
            }
          }
          return diag;
        }

        function render() {
          var el = getDiag();
          var text = stages.join('\n');
          if (hasError) {
            el.style.color = '#ff4444';
          }
          el.textContent = text + '\n';
        }

        window.__SMC_BOOT__ = function(stage) {
          stages.push('stage: ' + stage);
          if (hideTimer) {
            clearTimeout(hideTimer);
            hideTimer = null;
          }
          if (stage === 'mounted' && !hasError) {
            hideTimer = setTimeout(function() {
              if (diag) diag.style.display = 'none';
            }, 10000);
          }
          render();
        };

        // Initial lines
        stages.push('SMC boot: html');
        stages.push('UA: ' + (navigator.userAgent || 'unknown'));
        render();

        function errorHandler(event) {
          hasError = true;
          if (hideTimer) {
            clearTimeout(hideTimer);
            hideTimer = null;
          }
          var msg = '';
          if (event && event.reason) {
            var reason = event.reason;
            msg = (reason && reason.message) ? reason.message : String(reason);
          } else if (event && event.error) {
            var e = event.error;
            msg = (e && e.message) ? e.message : String(e);
          } else if (event && event.message) {
            msg = event.message;
          } else {
            msg = 'Unknown error';
          }
          var file = (event && event.filename) ? event.filename : '';
          var line = (event && event.lineno) ? event.lineno : '';
          var col = (event && event.colno) ? event.colno : '';
          var loc = file + (line ? ':' + line : '') + (col ? ':' + col : '');
          stages.push('ERR: ' + msg + (loc ? ' @ ' + loc : ''));
          render();
        }

        window.addEventListener('error', errorHandler);
        window.addEventListener('unhandledrejection', errorHandler);
      })();
    </script>
    <style>
      /* Prevent Android TV scaling issues */
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      
      /* Force specific dimensions for Android TV */
      @media screen and (min-width: 1920px) {
        html {
          font-size: 16px;
        }
        
        body {
          zoom: 1;
          transform: scale(1);
          transform-origin: 0 0;
        }
      }
      
      /* Firestick specific fixes */
      @media (max-height: 1080px) and (min-width: 1920px) {
        #root {
          height: 100vh;
          max-height: 100vh;
          overflow-y: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
