
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Android TV / STB tuning -->
    <meta name="theme-color" content="#000000">
    <meta name="msapplication-navbutton-color" content="#000000">
    
    <title>Snow Media Center</title>
    
    <!-- Google Fonts -->
    <!-- Preconnect to icon/APK host so image requests don't pay TLS per request -->
    <link rel="preconnect" href="https://snowmediaapps.com" crossorigin>
    <link rel="dns-prefetch" href="https://snowmediaapps.com">

    <!-- Google Fonts — trimmed to only families/weights actually used (Montserrat + Nunito) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Nunito:wght@400;500;700&display=swap" rel="stylesheet">

    
    <script>
      // Polyfill structuredClone for older Android WebViews (FireTV, older STBs)
      if (typeof structuredClone === 'undefined') {
        window.structuredClone = function(obj) {
          return JSON.parse(JSON.stringify(obj));
        };
      }
    </script>
    <script>
      // Boot-error catcher for old WebViews — ES5-safe, no dependencies
      (function() {
        var errors = [];
        var panel = null;
        var mounted = false;

        function checkMounted() {
          var root = document.getElementById('root');
          mounted = root && root.childNodes && root.childNodes.length > 0;
          return mounted;
        }

        function render() {
          if (checkMounted()) return;
          if (!panel) {
            panel = document.createElement('div');
            panel.id = 'boot-error-panel';
            var style = 'position:fixed;inset:0;z-index:99999;background:#111;color:#eee;font-family:monospace;font-size:16px;padding:24px;overflow:auto;';
            panel.setAttribute('style', style);

            var heading = document.createElement('div');
            heading.setAttribute('style', 'color:#ff4444;font-size:22px;font-weight:bold;margin-bottom:16px;');
            heading.appendChild(document.createTextNode('\u26A0 App failed to start'));
            panel.appendChild(heading);

            if (document.body) {
              document.body.appendChild(panel);
            } else {
              // body not ready yet, wait for DOMContentLoaded
              document.addEventListener('DOMContentLoaded', function() {
                if (!panel.parentNode && document.body) document.body.appendChild(panel);
              });
            }
          }

          // clear and rebuild so order is correct
          while (panel.childNodes.length > 1) {
            panel.removeChild(panel.lastChild);
          }

          for (var i = 0; i < errors.length; i++) {
            var err = errors[i];
            var block = document.createElement('div');
            block.setAttribute('style', 'border-top:1px solid #444;padding-top:12px;margin-top:12px;white-space:pre-wrap;word-break:break-word;');

            var msg = document.createElement('div');
            msg.setAttribute('style', 'color:#ff8888;margin-bottom:4px;');
            msg.appendChild(document.createTextNode(err.message || 'Unknown error'));
            block.appendChild(msg);

            if (err.source || err.lineno || err.colno) {
              var loc = document.createElement('div');
              loc.setAttribute('style', 'color:#aaa;font-size:14px;margin-bottom:4px;');
              var locText = (err.source || '') + (err.lineno ? ':' + err.lineno : '') + (err.colno ? ':' + err.colno : '');
              loc.appendChild(document.createTextNode(locText));
              block.appendChild(loc);
            }

            if (err.stack) {
              var st = document.createElement('div');
              st.setAttribute('style', 'color:#ccc;font-size:14px;');
              st.appendChild(document.createTextNode(err.stack));
              block.appendChild(st);
            }

            panel.appendChild(block);
          }
        }

        function handler(event) {
          if (checkMounted()) return;
          var err = {};
          if (event && event.reason) {
            // unhandledrejection
            var reason = event.reason;
            err.message = (reason && reason.message) ? reason.message : String(reason);
            err.stack = (reason && reason.stack) ? reason.stack : '';
          } else if (event && event.error) {
            // error event
            var e = event.error;
            err.message = (e && e.message) ? e.message : String(e);
            err.stack = (e && e.stack) ? e.stack : '';
            err.source = event.filename || '';
            err.lineno = event.lineno || 0;
            err.colno = event.colno || 0;
          } else if (event && event.message) {
            err.message = event.message;
            err.source = event.filename || '';
            err.lineno = event.lineno || 0;
            err.colno = event.colno || 0;
          } else {
            err.message = 'Unknown error';
          }
          errors.push(err);
          render();
        }

        window.addEventListener('error', handler);
        window.addEventListener('unhandledrejection', handler);
      })();
    </script>
    <style>
      /* Prevent Android TV scaling issues */
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      
      /* Force specific dimensions for Android TV */
      @media screen and (min-width: 1920px) {
        html {
          font-size: 16px;
        }
        
        body {
          zoom: 1;
          transform: scale(1);
          transform-origin: 0 0;
        }
      }
      
      /* Firestick specific fixes */
      @media (max-height: 1080px) and (min-width: 1920px) {
        #root {
          height: 100vh;
          max-height: 100vh;
          overflow-y: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
